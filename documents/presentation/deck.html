<header>Neuromorphic DHT — NH-1</header>
<h2 id="red-team--tier-1-deploy-blockers">Red team — Tier 1: deploy blockers</h2>
<p><em>Issues 1–4 from the v0.3.38 ranking. ~18–30 person-weeks, partially parallelizable. The protocol's claimed properties cannot be verified in production until these are addressed.</em></p>
<br />
<p><strong>1. Connection-setup model.</strong> Real WebRTC requires ICE + STUN/TURN + DTLS — <strong>1.5–3 seconds blocking</strong> per new synapse. Slice World &quot;unzips&quot; today only because hundreds of new triadic closures cost nothing.</p>
<ul>
<li><strong><code>CONNECTION_SETUP_MS = 1500–2000 ms</code></strong> — new synapses sit in <code>PENDING</code>, excluded from AP scoring until setup elapses.</li>
<li><strong>Browser-aware concurrency cap</strong> — Chrome desktop 4 / Safari &amp; mobile 2 ICE in flight; tab-backgrounding throttles to 1; GC-pause tolerance to suppress spurious timeout suspicion.</li>
</ul>
<br />
<p><strong>2. RPC timeouts and request/reply tracing.</strong> Today RPCs to dead nodes return instantly because the simulator knows. <strong>No timeouts, no dropped packets, no asymmetric reply paths.</strong></p>
<ul>
<li><strong><code>RPC_TIMEOUT_MS = 3000 ms</code></strong> — sends stall on silent failure before iterative-fallback / next AP hop.</li>
<li><strong>Request/reply RPC refactor</strong> — <code>routeMessage</code> traces forward and reverse paths. Either failure fails the RPC; reply may take a different path back.</li>
</ul>
<br />
<p><strong>3. Load-dependent AP scoring + bandwidth modeling.</strong> Today hop cost is <code>10 ms + propagation</code> regardless of load. AP routing risks oscillatory <em>success disasters</em> — reinforce a node until it congests, abandon it, flock back when it recovers.</p>
<ul>
<li><strong><code>effective_delay = base_delay × (1 + msg_rate / bandwidth_cap)</code></strong> — load enters AP as <code>½^(load_factor)</code>, the same form as the existing latency penalty (Makris et al. 2017 — DFE-style threshold control).</li>
<li><strong>Bandwidth dropping</strong> when a node exceeds its modeled cap — exposes whether AP routes around overload or piles in.</li>
</ul>
<br />
<p><strong>4. Jitter injection + LTP-EMA validation.</strong> Real RTTs fluctuate ±30 % from bufferbloat and queueing.</p>
<ul>
<li>Add <code>Normal(0, JITTER_SIGMA)</code> to per-hop RTT. Verify the LTP EMA doesn't oscillate; tune the EMA constant if it does.</li>
</ul>
<p><span class="callout"><strong>Gate.</strong> No deploy claim about latency, churn, or pub/sub holds until the simulator models all four sources of friction. Once it does, the existing measurements re-run as production-honest.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="red-team--tier-2-correctness-under-stress">Red team — Tier 2: correctness under stress</h2>
<p><em>Issues 5–8 from the v0.3.38 ranking. ~16–28 person-weeks. The protocol works in nominal conditions; under realistic adversarial or heterogeneous workloads it degrades. Staged rollout can manage this — but it must be measured, not assumed.</em></p>
<br />
<p><strong>5. Sybil &amp; cell eclipse hardening.</strong></p>
<ul>
<li><strong>Vivaldi RTT integration</strong> — replace self-declared S2 prefix with organically learned coordinates (Sybil-resistant locality without trusting peer self-claims).</li>
<li><strong>Geographic proof-of-work / IP-ASN binding</strong> — require geo-prefix to align with actual ASN/region; raises the cost of cell eclipse drastically.</li>
</ul>
<br />
<p><strong>6. Heterogeneous-churn convergence.</strong></p>
<ul>
<li><strong>Variable-churn benchmark</strong> — alternate 3/sec churn for 30 min with 0.5/sec for 90 min. Measures adaptation time at transitions.</li>
<li><strong>Adaptive anneal driven by churn rate</strong> <em>(Ghinita &amp; Teo 2006).</em> Anneal cooling rate, reheat amount, staleness threshold all become functions of locally-observed <code>(μ, λ)</code>. Peers in stable regions anneal slowly; peers in high-churn regions anneal aggressively.</li>
<li><strong>Liveness vs accuracy decoupled</strong> <em>(Ghinita-Teo).</em> Independent threshold-triggered channels — one operator dial per channel.</li>
<li><strong>Patchwork-style background liveness probes</strong> <em>(Tapestry 2004).</em> Catches silent failures before routing errors fire.</li>
</ul>
<br />
<p><strong>7. Byzantine pub/sub mitigation.</strong></p>
<ul>
<li><strong>MaxDisjoint topic replication</strong> <em>(Harvesf &amp; Blough 2007).</em> Replicate every axon-tree root at <em>d</em> disjoint locations. No single node — or single S2-cell eclipse — can silence a topic.</li>
<li><strong>Zipf-distributed publish workload</strong> + <strong>hot-axon-root migration</strong> <em>(Makris et al. 2017).</em> Threshold-triggered topic migration with DFE-style redirect at the original location, closing the <em>gateway concentration</em> failure mode under content popularity.</li>
</ul>
<br />
<p><strong>8. Asymmetric reachability and bilateral failure</strong> <em>(NEW).</em></p>
<ul>
<li><strong>Per-direction <code>Synapse</code> fields</strong> — <code>forwardReachable</code>, <code>reverseReachable</code>, <code>forwardLatencyEMA</code>, <code>reverseLatencyEMA</code>, <code>asymmetryFlag</code>. Updated on every successful exchange in either direction.</li>
<li><strong>Direction-specific AP scoring</strong> — exclude <code>forwardReachable=false</code> for forward routing; same for reverse during reply paths.</li>
<li><strong>Loop detection in iterative fallback</strong> — track visited node IDs; explicitly exclude already-visited on expansion.</li>
<li><strong>Bidirectional eviction agency</strong> — when A connects to B, B independently runs admission; the asymmetry becomes explicit (A holds the synapse, B may not).</li>
</ul>
<p><span class="callout"><strong>Gate.</strong> Tier-2 items measure how the protocol degrades under <em>real</em> heterogeneity. Production deployment can begin while these items are in flight, but each carries a metric the deployment must monitor live.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="red-team--tier-3-operational-hardening">Red team — Tier 3: operational hardening</h2>
<p><em>Issues 9–13 from the v0.3.38 ranking. ~17–25 person-weeks. Long-tail items for production maturity, second-deployment confidence, and operator handoff.</em></p>
<br />
<p><strong>9. Promoted-incoming bias and spam resistance</strong> <em>(NEW).</em> The &quot;incoming promotion&quot; rule has no defensive limit — a popular node's synaptome can become 5/45 outbound/incoming-promoted, losing diverse outbound coverage.</p>
<ul>
<li><strong>Track synapse origin</strong> (<code>OUTBOUND_LEARNED | INCOMING_PROMOTED | BOOTSTRAP_SEED</code>).</li>
<li><strong>Cap promoted-incoming at ~30 %</strong> of synaptome budget; reduced inertia for promoted entries.</li>
<li><strong>Per-source spam rate-limit</strong> — sources connecting &gt; 10/sec have promotion suppressed regardless of useCount.</li>
</ul>
<br />
<p><strong>10. Parameter sensitivity sweep + four-dial framework</strong> <em>(NEW).</em> The &quot;12 parameters&quot; claim only holds if individual parameters are robust and interactions are documented.</p>
<ul>
<li><strong>OFAT ±20 % / ±50 %</strong> sweep per parameter at 25K nodes — identifies high-sensitivity parameters needing narrow operator bounds.</li>
<li><strong>2D interaction sweep</strong> across the 66 parameter pairs — surface joint-only effects.</li>
<li><strong>Scale- and workload-aware defaults</strong> — repeat at 1K/10K/50K and under uniform / Zipf / Slice-World workloads.</li>
</ul>
<br />
<p><strong>11. Replay-cache semantics under partition</strong> <em>(NEW).</em> The bounded replay cache is designed for transient churn, not multi-minute regional partitions.</p>
<ul>
<li><strong>Cache metadata on replay</strong> — <code>(oldestTs, newestTs, capacity, gapsDetected)</code> so subscribers know whether they have a gap.</li>
<li><strong>Multi-source replay reconciliation</strong> — dovetails with MaxDisjoint replication; subscribers query several replicas in parallel and dedupe by <code>publishId</code>.</li>
<li><strong>Partition-aware retention</strong> — extend cache window when forward-attempt failure rate spikes.</li>
</ul>
<br />
<p><strong>12. Concurrent connection-setup contention</strong> <em>(NEW — folds into Tier-1 #1 once Tier 2 is in flight).</em> Browser concurrency limits cause learning rules to silently serialize. Adaptive throttling + GC-pause / tab-backgrounding handling already covered above; explicitly track here so the operability metric isn't lost.</p>
<br />
<p><strong>13. Adversarial operator tuning + audit hygiene</strong> <em>(NEW).</em></p>
<ul>
<li><strong>Multi-source metric verification</strong> — dashboard churn rate cross-checked against locally-measured per-node samples; alert on disagreement.</li>
<li><strong>Audit log + canary rollout</strong> — parameter changes affect 10 % of nodes for 1 hour; auto-rollback if metrics regress.</li>
</ul>
<br />
<p><strong>Plus, from prior comparison work, integrated here as architectural hardening:</strong></p>
<ul>
<li><strong>Target-QoS knob</strong> <em>(Ghinita &amp; Teo 2006).</em> Expose <code>targetLookupFailureRate</code> / <code>targetMedianLatency</code>; system self-tunes underlying constants. Precondition for metaplastic NH-1.</li>
<li><strong>Parametrized hop caching with <code>(k_backup, l_nearest, m_hops)</code> knobs</strong> <em>(Tapestry 2004).</em> Empirical guidance: <code>(1, 5, 1)</code> is the cost / RDP sweet spot.</li>
<li><strong>Explicit leaf-set tier in the synaptome</strong> <em>(Pastry 2001).</em> Reserve ~8 entries for XOR-closest peers regardless of vitality — guarantees a terminal-hop landing point.</li>
</ul>
<p><span class="callout"><strong>Bottom line.</strong> The brain is production-ready. The body is the next <em>measurable, scopeable</em> problem rather than a tangle of interacting mechanisms. Each tier produces falsifiable measurements; the simulator becomes the lab bench for the next iteration.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="references--dht-foundations">References — DHT foundations</h2>
<p><strong>Whitepaper</strong> — <code>documents/Neuromorphic-DHT-Architecture.md</code> (this repository, v0.67)<br />
<strong>Source + data</strong> — <code>github.com/YZ-social/dht-sim</code></p>
<br />
<h3 id="architecture">Architecture</h3>
<ul>
<li>Saltzer, Reed, Clark · <em>End-to-End Arguments in System Design</em> (ACM TOCS 1984) — function placement principle</li>
<li>Clark · <em>The Design Philosophy of the DARPA Internet Protocols</em> (SIGCOMM 1988)</li>
</ul>
<h3 id="foundational-dht-work">Foundational DHT work</h3>
<ul>
<li>Maymounkov &amp; Mazières · <em><strong>Kademlia: A Peer-to-peer Information System Based on the XOR Metric</strong></em> (IPTPS 2002) — <strong>the literal substrate of N-DHT</strong>. XOR distance, K-buckets, α-parallel lookup, four-RPC protocol — all retained unchanged below the synaptome layer. NX-4 iterative fallback is unmodified Kademlia routing</li>
<li>Rowstron &amp; Druschel · <em><strong>Pastry: Scalable, decentralized object location and routing</strong></em> (Middleware 2001) — the canonical <strong>three-tier routing state</strong> (R / L / M) and <strong>locality-preserving join</strong>; substrate for SCRIBE and PAST. NH-1's synaptome consolidates Pastry's three tables into a single vitality-scored set</li>
<li>Zhao, Huang, Stribling, Rhea, Joseph, Kubiatowicz · <em><strong>Tapestry: A Resilient Global-Scale Overlay for Service Deployment</strong></em> (IEEE JSAC 2004) — the closest historical ancestor of NH-1's combined locality + soft-state + resilience architecture; substrate for OceanStore, Bayeux multicast, and Mnemosyne</li>
</ul>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="references--production-resilience">References — Production resilience</h2>
<h3 id="byzantine-resistance--route-diversity">Byzantine resistance / route diversity</h3>
<ul>
<li>Castro, Druschel, Ganesh, Rowstron, Wallach · <em><strong>Secure Routing for Structured Peer-to-Peer Overlay Networks</strong></em> (OSDI 2002) — the foundational Byzantine-DHT paper; the <strong>constrained routing + secure ID assignment + redundant routing</strong> triplet</li>
<li>Harvesf, Blough · <em><strong>The Design and Evaluation of Techniques for Route Diversity in Distributed Hash Tables</strong></em> (IEEE P2P 2007) — <strong>MaxDisjoint replica placement</strong> + Neighbor Set Routing; 90 % lookup success at 50 % node failure</li>
</ul>
