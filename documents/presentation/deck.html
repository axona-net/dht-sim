<header>Neuromorphic DHT — NH-1</header>
<h2 id="honesty-locality-vs-latency">Honesty: locality vs. latency</h2>
<p><strong>N-DHT's priorities are speed and robustness</strong> — fast lookup, reliable delivery. Geographic location is <em>not a goal</em>; it is one input.</p>
<p><strong>What the simulator does.</strong> Every protocol's hop latency is computed from physical (haversine) distance between simulated nodes — a faithful Internet model. This is what the real Internet looks like to all four protocols.</p>
<p><strong>What the protocol does.</strong> A node knows <em>only its own</em> S2 cell — embedded once, at creation, into the top of its 64-bit ID:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>nodeId = S2 cell prefix (8 bits) ‖ H(publicKey)
</code></pre>
<p>The protocol cannot ask another node <em>&quot;where are you?&quot;</em> — there is no such message. The S2 prefix creates <strong>initial regional clustering at bootstrap</strong> because nearby nodes are XOR-close, so a node's K-bucket and synaptome are seeded with mostly-local peers. After that, locality is a derived property of the routes that LTP and vitality reinforce.</p>
<p><strong>Latency is used in routing</strong>, indirectly: AP scoring includes a <code>½^(latency_ms/100)</code> penalty, so observed round-trip time (<strong>RTT</strong>) influences hop selection. Fast peers win at every distance — that is the speed-first priority in action.</p>
<br />
<p><span class="muted"><strong>Lineage note.</strong> <em>Putting locality in the routing layer itself</em> is the canonical contribution of the parallel <strong>Tapestry</strong> (Zhao et al., JSAC 2004) and <strong>Pastry</strong> (Rowstron &amp; Druschel, Middleware 2001) lineages — both store the closest match by RTT in each routing-table slot, and Pastry's locality-preserving join carries the property to new nodes without exhaustive search. NH-1 inherits the instinct from both and pushes it further: <strong>structural</strong> (S2 prefix at bootstrap, three-tier role decomposition via vitality) plus <strong>dynamic</strong> (latency penalty in AP scoring, evolving via LTP). Both axes are descended from the Pastry / Tapestry choice; the <em>learning</em> is what we add.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="the-geobits--0-ablation">The geoBits = 0 ablation</h2>
<p>When we strip the S2 prefix from <strong>NH-1</strong> and re-run, regional latency collapses:</p>
<table>
<thead>
<tr>
<th>Test</th>
<th style="text-align:right">NH-1 · geoBits = 8 (hops / ms)</th>
<th style="text-align:right">NH-1 · <strong>geoBits = 0</strong> (hops / ms)</th>
<th style="text-align:right">Δ ms</th>
</tr>
</thead>
<tbody>
<tr>
<td>Global</td>
<td style="text-align:right">5.09 / 263 ms</td>
<td style="text-align:right">5.94 / 453 ms</td>
<td style="text-align:right">+72 %</td>
</tr>
<tr>
<td>500 km</td>
<td style="text-align:right">3.31 / 96 ms</td>
<td style="text-align:right"><strong>6.01 / 444 ms</strong></td>
<td style="text-align:right"><strong>+363 %</strong></td>
</tr>
<tr>
<td>2000 km</td>
<td style="text-align:right">3.93 / 123 ms</td>
<td style="text-align:right">6.01 / 437 ms</td>
<td style="text-align:right">+255 %</td>
</tr>
<tr>
<td>5000 km</td>
<td style="text-align:right">4.54 / 169 ms¹</td>
<td style="text-align:right">5.96 / 433 ms</td>
<td style="text-align:right">+156 %</td>
</tr>
</tbody>
</table>
<p><span class="muted">All cells are NH-1 measurements at 25 K nodes, web-limited (cap = 100), hw = 0. The 4-way comparison covering all protocols at geoBits = 0 is on the next slide.</span></p>
<p><span class="muted">¹ The geoBits = 8 baseline at 5000 km is from the headline 4-way comparison run (which measured all five distance bands). The geoBits = 0 sweep run measured 5000 km natively; the geoBits = 8 run in the same sweep skipped 5000 km for time. Numbers are from comparable 25 K, hw = 0 conditions but distinct CSVs.</span></p>
<br />
<p>The latency penalty in AP routing is not strong enough, on its own, to discover locality from scratch within standard warmup (~5000 lookups). The S2 prefix is the <strong>bootstrap shortcut</strong>: it does not <em>teach</em> locality, it <em>seeds</em> the network with locality so reinforcement can sharpen routing within it.</p>
<br />
<p><span class="callout">Geography is an initial-condition shortcut for the latency optimization, not a goal in itself. Future work: an embedded RTT-coordinate system (Vivaldi-style) could replace the S2 seed with a learned one — see the comparison slide later in this deck.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="geobits--0--isolating-the-learning-advantage">geoBits = 0 — isolating the learning advantage</h2>
<p>If we strip the S2 prefix from <em>every</em> protocol simultaneously — and use <strong>canonical init</strong> so each protocol starts from the identical K-closest-XOR routing table — the comparative picture isolates exactly the routing/learning algorithm.</p>
<p><span class="muted">25 K nodes, web-limited (cap = 100), omniscient init, <strong>geoBits = 0</strong>, <strong>canonical init</strong>.</span></p>
<table>
<thead>
<tr>
<th>Protocol</th>
<th style="text-align:right">geoBits = 8 · Global ms (reference)</th>
<th style="text-align:right">geoBits = 0 · Global ms</th>
<th style="text-align:right">geoBits = 0 · 500 km</th>
<th style="text-align:right">geoBits = 0 · 2000 km</th>
<th>Notes</th>
</tr>
</thead>
<tbody>
<tr>
<td>Kademlia</td>
<td style="text-align:right">508</td>
<td style="text-align:right"><strong>506</strong></td>
<td style="text-align:right">511</td>
<td style="text-align:right">504</td>
<td>No locality either way — geoBits doesn't matter to pure XOR.</td>
</tr>
<tr>
<td>G-DHT</td>
<td style="text-align:right">284</td>
<td style="text-align:right"><strong>780</strong></td>
<td style="text-align:right">765</td>
<td style="text-align:right">781</td>
<td>Geo-prefix carries G-DHT entirely; without it, a <code>noProgressLimit = 3</code> overhead leaves it slower than K-DHT.</td>
</tr>
<tr>
<td><strong>NX-17</strong></td>
<td style="text-align:right">241</td>
<td style="text-align:right"><strong>376</strong></td>
<td style="text-align:right"><strong>341</strong></td>
<td style="text-align:right"><strong>355</strong></td>
<td>Loses locality but still beats Kademlia by <strong>26 %</strong> at geoBits = 0 — pure learning advantage.</td>
</tr>
<tr>
<td>NH-1</td>
<td style="text-align:right">269</td>
<td style="text-align:right">467</td>
<td style="text-align:right">418</td>
<td style="text-align:right">439</td>
<td>Beats Kademlia by <strong>8 %</strong> at geoBits = 0. Same learning chassis as NX-17, simpler — pays a measurable consolidation cost.</td>
</tr>
</tbody>
</table>
<p><span class="muted">The first column repeats each protocol's geoBits = 8 baseline so the <em>learning advantage</em> and <em>locality contribution</em> can be read off the same row. Headline finding is the third column (geoBits = 0 global).</span></p>
<br />
<p><strong>Three findings:</strong></p>
<ol>
<li><strong>NX-17 and NH-1 still beat Kademlia under identical bootstrap and no locality.</strong> This is the cleanest possible &quot;learning helps&quot; claim — every confound (bootstrap strategy, geographic prefix) controlled. NX-17 wins by 26 %, NH-1 by 8 %.</li>
<li><strong>G-DHT vs K-DHT exposes a non-bootstrap difference.</strong> Canonical init equalizes bootstrap; the residual 780-vs-506 gap comes from G-DHT's lookup-tuning choice (<code>noProgressLimit = 3</code>), tuned for geographic-routing escapes that don't exist at geoBits = 0. A real architectural finding the methodology surfaced.</li>
<li><strong>NH-1 vs NX-17 narrows but doesn't close.</strong> The 80/20 supplement helped NX-17 by ~7 ms at geoBits=8 (native vs canonical). At geoBits=0 the 376-vs-467 gap is roughly 24 % — it's NX-17's specialized rules, not its bootstrap, doing the work.</li>
</ol>
<p><span class="callout"><strong>The headline gap is real and measurable.</strong> NX-17 at 376 ms vs Kademlia at 506 ms, identical starting state, no locality, no geography — that is what the routing/learning algorithm contributes. Removing that distance from the deck would be hiding the actual claim.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="init-mode-%C3%97-geobits--the-full-2-%C3%97-2">Init mode × geoBits — the full 2 × 2</h2>
<p><span class="muted"><em>Reference table — the full bootstrap × locality cross-product. The earlier geoBits=0 ablation slide carries the headline finding; this slide is for readers who want to verify the result holds across all four cells.</em></span></p>
<p>Global lookup latency in milliseconds. <strong>Canonical</strong> = every protocol starts from K-closest-XOR (identical state). <strong>Native</strong> = each protocol's own bootstrap strategy (Kademlia: pure XOR; G-DHT: 50/50 stratified+random; NX-17: 80/20; NH-1: pure XOR).</p>
<p><span class="muted">25 K nodes, web-limited (cap = 100), omniscient init, hw = 0.</span></p>
<table>
<thead>
<tr>
<th></th>
<th style="text-align:right">Kademlia</th>
<th style="text-align:right">G-DHT</th>
<th style="text-align:right">NX-17</th>
<th style="text-align:right">NH-1</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>geoBits = 8 · native</strong></td>
<td style="text-align:right">488</td>
<td style="text-align:right">289</td>
<td style="text-align:right"><strong>234</strong></td>
<td style="text-align:right">254</td>
</tr>
<tr>
<td><strong>geoBits = 8 · canonical</strong></td>
<td style="text-align:right">508</td>
<td style="text-align:right">284</td>
<td style="text-align:right">241</td>
<td style="text-align:right">269</td>
</tr>
<tr>
<td><strong>geoBits = 0 · native</strong></td>
<td style="text-align:right">493</td>
<td style="text-align:right">769</td>
<td style="text-align:right">377</td>
<td style="text-align:right">461</td>
</tr>
<tr>
<td><strong>geoBits = 0 · canonical</strong></td>
<td style="text-align:right">506</td>
<td style="text-align:right">780</td>
<td style="text-align:right"><strong>376</strong></td>
<td style="text-align:right">467</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Three things this 2 × 2 makes visible:</strong></p>
<ul>
<li><strong>Bootstrap matters less than people often assume.</strong> Native vs canonical at geoBits = 8 swings each protocol by under 8 %. The architectural choices are real but small relative to other effects.</li>
<li><strong>The geographic prefix matters a lot — for everyone.</strong> Geo = 8 to geo = 0 doubles K-DHT-equivalent latency. The S2 prefix is doing real work in every column. Removing it forces every protocol to route under genuinely random IDs.</li>
<li><strong>Learning matters most under stress.</strong> At geoBits = 0 / canonical (the hardest condition for routing), NX-17 is 26 % faster than Kademlia and NH-1 is 8 % faster. Under easier conditions (geoBits = 8) the gap widens further. <strong>The advantage scales with how much there is to learn.</strong></li>
</ul>
<p><span class="callout">Canonical-init isolates the routing/learning algorithm. Native-init measures the protocol as deployed. Both are real; both belong in the record. The deck headlines canonical because it's the cleaner architectural claim.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="n-1-%E2%86%92-nh-1--three-phases-of-research">N-1 → NH-1 — three phases of research</h2>
<table>
<thead>
<tr>
<th>Phase</th>
<th>Generation</th>
<th>Contribution</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Exploration</strong></td>
<td>N-1</td>
<td>First neuromorphic DHT — Hebbian synapse weighting, action-potential routing, two-hop lookahead</td>
</tr>
<tr>
<td></td>
<td>N-15W</td>
<td>Renewal-Based Highway Protection — last protocol of the original lineage before the restart</td>
</tr>
<tr>
<td><strong>Focused iteration</strong></td>
<td>NX-1</td>
<td>Clean, configurable restart of the architecture from a fresh base</td>
</tr>
<tr>
<td></td>
<td>NX-4</td>
<td><strong>Watershed</strong>: iterative fallback — every protocol below fails under stress, every protocol at or above succeeds</td>
</tr>
<tr>
<td></td>
<td>NX-6</td>
<td>Churn-resilience baseline: dead-synapse eviction, temperature reheat, adaptive decay</td>
</tr>
<tr>
<td></td>
<td>NX-10</td>
<td>Routing-topology forwarding tree — the first stable axonal-style pub/sub</td>
</tr>
<tr>
<td></td>
<td>NX-11</td>
<td>Diversified bootstrap — the 80 / 20 stratified + random allocation that NX-17 inherits</td>
</tr>
<tr>
<td></td>
<td>NX-15</td>
<td><code>AxonManager</code> generic membership protocol with K-closest replication</td>
</tr>
<tr>
<td></td>
<td>NX-17</td>
<td>Publisher-prefix topic IDs + pure routed axonal tree (no replication, no gossip)</td>
</tr>
<tr>
<td><strong>Consolidation</strong></td>
<td><strong>NH-1</strong></td>
<td>Vitality-driven unified admission gate — consolidates 18 specialized rules into 12; ~270 lines vs NX-17's ~2300</td>
</tr>
</tbody>
</table>
<br />
<p><span class="callout"><strong>NX-16: a cautionary dead end.</strong> NX-16 attempted to decouple <code>findKClosest</code>'s target cell from the node-ID prefix by masking the top 8 bits in the distance metric. Routing collapsed: publisher and subscribers found <em>different</em> &quot;closest&quot; nodes for the same topic; delivery dropped to ~40 % even at zero churn. The lesson: <strong>the distance metric used to select candidates must match the gradient used to expand them.</strong> Archived, not deleted — design failures earn their place in the record.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>

<h2 id="nx-17-rules-and-their-nh-1-disposition">NX-17 rules and their NH-1 disposition</h2>
<p><span class="muted"><em>Reference table — the full audit trail of which NX-17 rules survived consolidation and which were dropped. Skip on a first read; consult when you want to know what specifically changed.</em></span></p>
<table>
<thead>
<tr>
<th>NX-17 rule</th>
<th>What it does</th>
<th>NH-1 status</th>
</tr>
</thead>
<tbody>
<tr>
<td>Stratified bootstrap</td>
<td>Cold-start coverage across XOR strata</td>
<td><strong>Kept</strong> (STRUCTURE)</td>
</tr>
<tr>
<td>Diversified bootstrap (80/20)</td>
<td>20 % random peers for global reach</td>
<td><strong>Kept</strong> (merged into bootstrap)</td>
</tr>
<tr>
<td>Two-tier synaptome (50 + highway)</td>
<td>Separate &quot;permanent&quot; + &quot;candidate&quot; tiers</td>
<td><strong>Replaced</strong> by per-node <code>_maxSynaptome</code></td>
</tr>
<tr>
<td>Stratified eviction</td>
<td>Evict from over-represented stratum</td>
<td><strong>Replaced</strong> by vitality eviction</td>
</tr>
<tr>
<td>Stratum floors</td>
<td>Guarantee min peers per stratum</td>
<td><strong>Removed</strong> — vitality + diversity penalty handles it</td>
</tr>
<tr>
<td>Synaptome floor</td>
<td>Refuse eviction below N peers</td>
<td><strong>Removed</strong> — vitality preserves locked entries</td>
</tr>
<tr>
<td>AP routing</td>
<td>Learned-weight greedy walk</td>
<td><strong>Kept</strong> (NAVIGATE)</td>
</tr>
<tr>
<td>Two-hop lookahead</td>
<td>Probe second-hop alternatives</td>
<td><strong>Kept</strong> (NAVIGATE)</td>
</tr>
<tr>
<td>Epsilon-greedy first hop</td>
<td>Random first hop with prob ε</td>
<td><strong>Kept</strong> (EXPLORE)</td>
</tr>
<tr>
<td>Iterative fallback</td>
<td>k-closest fallback when AP fails</td>
<td><strong>Kept</strong> (NAVIGATE)</td>
</tr>
<tr>
<td>LTP</td>
<td>Reinforce successful paths</td>
<td><strong>Kept</strong> (LEARN)</td>
</tr>
<tr>
<td>Hop caching + lateral spread</td>
<td>Cache destination on intermediates</td>
<td><strong>Kept</strong> (LEARN)</td>
</tr>
<tr>
<td>Triadic closure</td>
<td>Learn long edges from transit</td>
<td><strong>Kept</strong> (LEARN)</td>
</tr>
<tr>
<td>Incoming promotion</td>
<td>Promote popular incoming peers</td>
<td><strong>Kept</strong> (LEARN)</td>
</tr>
<tr>
<td>Adaptive decay</td>
<td>Per-node decay rate based on usage</td>
<td><strong>Default off</strong> — flat γ = 0.995 wins</td>
</tr>
<tr>
<td>Simulated annealing</td>
<td>Replace lowest-vitality with 2-hop sample</td>
<td><strong>Kept</strong> (EXPLORE)</td>
</tr>
<tr>
<td>Churn recovery (dead-syn eviction)</td>
<td>Drop dead peers on discovery</td>
<td><strong>Kept</strong> (FORGET)</td>
</tr>
<tr>
<td>Temperature reheat on death</td>
<td>Spike T after dead-peer discovery</td>
<td><strong>Kept</strong> (EXPLORE)</td>
</tr>
<tr>
<td>Diversity budget penalty</td>
<td>Penalise over-represented stratum groups</td>
<td><strong>Removed</strong> v0.65.06 (harmful)</td>
</tr>
<tr>
<td>weightScale parameter</td>
<td>Bias AP scoring toward LTP weight</td>
<td><strong>Removed</strong> v0.66.10 (no measurable effect)</td>
</tr>
</tbody>
</table>
<p><span class="muted">~18 rules + 5 retired parameters → 12 active rules in NH-1. Behavioral surface is the same; admission logic is unified.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="nh-1-vs-nx-17--and-why">NH-1 vs NX-17 — and why</h2>
<table>
<thead>
<tr>
<th>Test</th>
<th style="text-align:right">NX-17</th>
<th style="text-align:right"><strong>NH-1</strong></th>
<th style="text-align:right">Δ (NH-1 vs NX-17)</th>
</tr>
</thead>
<tbody>
<tr>
<td>Global</td>
<td style="text-align:right">4.40 hops / 242 ms</td>
<td style="text-align:right">5.15 hops / 263 ms</td>
<td style="text-align:right">+17 % hops, +9 % ms</td>
</tr>
<tr>
<td>500 km</td>
<td style="text-align:right">2.75 / 80 ms</td>
<td style="text-align:right">3.28 / 95 ms</td>
<td style="text-align:right">+19 % hops, +18 % ms</td>
</tr>
<tr>
<td>2000 km</td>
<td style="text-align:right">3.27 / 105 ms</td>
<td style="text-align:right">4.01 / 126 ms</td>
<td style="text-align:right">+23 % hops, +20 % ms</td>
</tr>
<tr>
<td>5000 km</td>
<td style="text-align:right">3.74 / 143 ms</td>
<td style="text-align:right">4.54 / 169 ms</td>
<td style="text-align:right">+21 % hops, +18 % ms</td>
</tr>
<tr>
<td>pubsubm delivered</td>
<td style="text-align:right">100 %</td>
<td style="text-align:right">100 %</td>
<td style="text-align:right">tie</td>
</tr>
<tr>
<td>pubsubm + 5 % churn (recovered)</td>
<td style="text-align:right">100 %</td>
<td style="text-align:right">100 %</td>
<td style="text-align:right">tie</td>
</tr>
<tr>
<td>dead-children / orphans</td>
<td style="text-align:right">0 / 0</td>
<td style="text-align:right">0 / 0</td>
<td style="text-align:right">tie</td>
</tr>
</tbody>
</table>
<br />
<p>The residual gap reflects two things:</p>
<p><strong>1. NX-17's specialized eviction policies are tuned for the cap=100 case.</strong> Stratified eviction with stratum and synaptome floors <em>guarantees</em> a coverage profile that NH-1's vitality eviction approximates but doesn't pin. Under tight caps, that difference is measurable.</p>
<p><strong>2. NH-1 trades peak performance for simplicity.</strong> ~270 lines vs NX-17's ~2300; 12 parameters vs ~44. The point is not that NH-1 is <em>faster</em> — it's that NH-1 is <em>almost as fast</em> with one unified admission gate that's easier to reason about and easier to extend.</p>
<br />
<p><span class="callout">Highway% recovers the gap and more — at hw=15 % NH-1 is <strong>223 ms global</strong>, beating NX-17's all-browser 242 ms. The capped gap is the cost of consolidation. We accept it.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-kademlia">What is Kademlia?</h2>
<p><strong>Maymounkov &amp; Mazières</strong> (NYU — IPTPS 2002, <em>Kademlia: A Peer-to-peer Information System Based on the XOR Metric</em>) is <strong>the foundational paper N-DHT is built on</strong>. Every Kademlia idea — the XOR metric, K-buckets, α-parallel lookup, the four-RPC protocol — survives literally inside NH-1. Without Kademlia, there is no N-DHT.</p>
<br />
<p><strong>The XOR metric.</strong> Distance between two 160-bit IDs is <code>d(x, y) = x ⊕ y</code> — the bitwise XOR interpreted as an integer. <strong>Symmetric</strong> (<code>d(x,y) = d(y,x)</code>) and obeys the triangle inequality. Symmetry is what makes Kademlia self-organizing: every message a node receives — request <em>or</em> reply — conveys useful contact information that updates the recipient's routing table. Asymmetric metrics (Chord's clockwise distance) force one-way table maintenance and rigid finger-table positioning.</p>
<p><strong>K-buckets.</strong> Each node maintains up to <strong>K=20 peers</strong> per XOR-distance interval <code>[2^i, 2^(i+1))</code>. Lists are sorted by last-seen — least-recently-seen at the head. New contacts are inserted at the tail; <strong>live old contacts are never evicted</strong>, only stale ones. This LRU-with-old-bias policy exploits a key empirical observation (Saroiu et al.): <em>the longer a peer has been up, the more likely it stays up another hour.</em> Old contacts are the reliable ones.</p>
<p><strong>α-parallel lookup.</strong> To find the K nodes closest to a target ID, a node issues <strong>α=3 parallel asynchronous <code>FIND_NODE</code> RPCs</strong> to its α closest known peers. Each response narrows the candidate set; the node iterates until the K closest seen are all reachable. Parallelism trades a constant-factor bandwidth increase for <strong>delay-free fault tolerance</strong> — if one query times out, two others are already in flight.</p>
<p><strong>Four RPCs:</strong> <code>PING</code>, <code>STORE</code>, <code>FIND_NODE</code>, <code>FIND_VALUE</code>. The entire protocol surface fits in this set.</p>
<p><strong>Production deployments.</strong> BitTorrent Mainline DHT (millions of simultaneous nodes since 2005), Ethereum devp2p (peer discovery for blockchain consensus), IPFS / libp2p (content routing), Tor v3 hidden services (onion-service descriptor lookup). <strong>The most-deployed DHT family in production.</strong></p>
<p><span class="callout"><strong>For this project:</strong> Kademlia is N-DHT's literal substrate. Every learning rule, every vitality calculation, every axonal tree sits <em>on top of</em> Kademlia routing. When AP scoring fails (NX-4 iterative fallback), the protocol falls back to <em>unmodified Kademlia</em>. The relationship is not analogical — it is <strong>structural inclusion</strong>.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="kademlia-vs-n-dht">Kademlia vs N-DHT</h2>
<p>The most important comparison in this section. <strong>N-DHT does not replace Kademlia — it adds learning on top of it.</strong></p>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Kademlia</th>
<th>N-DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Distance metric</strong></td>
<td>XOR, symmetric, triangle-inequality</td>
<td><strong>Same XOR metric</strong> — inherited unchanged</td>
</tr>
<tr>
<td><strong>Routing-table structure</strong></td>
<td>K-buckets, K=20 per stratum</td>
<td><strong>K-buckets become the synaptome</strong> — same per-stratum layout, K capped at 50 total entries</td>
</tr>
<tr>
<td><strong>Eviction policy</strong></td>
<td>LRU within bucket; live old peers never evicted</td>
<td><strong>Replaced by vitality</strong> (<code>weight × recency</code>) — generalizes the &quot;old-is-better&quot; heuristic to traffic-driven evidence</td>
</tr>
<tr>
<td><strong>Lookup parallelism</strong></td>
<td>α-parallel async <code>FIND_NODE</code> (α=3)</td>
<td><strong>Same α-parallel pattern</strong> retained for iterative fallback; AP scoring narrows the parallel set</td>
</tr>
<tr>
<td><strong>Routing decision</strong></td>
<td>Pick α closest by XOR</td>
<td><strong>Pick best by AP score</strong> = <code>progress × weight × ½^(latency/100)</code> — XOR is one of three factors, not the only one</td>
</tr>
<tr>
<td><strong>Self-organization</strong></td>
<td>Every incoming/outgoing message updates a K-bucket</td>
<td><strong>Same</strong> — plus LTP reinforcement on successful paths</td>
</tr>
<tr>
<td><strong>Pub/sub</strong></td>
<td>Out of scope</td>
<td>First-class — axonal trees on top of Kademlia routing</td>
</tr>
<tr>
<td><strong>Locality</strong></td>
<td>None — IDs are random hashes</td>
<td>S2 prefix at bootstrap + AP latency penalty + LTP reinforcement</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Where they overlap.</strong> <strong>Everything below the synaptome layer is Kademlia.</strong> XOR distance, K-buckets, α-parallel lookup, the four-RPC protocol surface, the symmetric-metric self-organization, the &quot;trust old peers&quot; heuristic — all retained literally. NX-4 iterative fallback is the path the protocol takes when learning provides no signal: pure Kademlia.</p>
<p><strong>Where N-DHT continues.</strong> Three additions, in order of impact: <strong>(1)</strong> synapses carry weights reinforced by LTP (Hebbian learning replaces XOR-only ranking); <strong>(2)</strong> S2 prefix in IDs gives bootstrap locality (Kademlia is locality-blind); <strong>(3)</strong> axonal trees provide a built-in pub/sub primitive (Kademlia has no broadcast).</p>
<p><span class="callout"><strong>The relationship is structural, not analogical.</strong> N-DHT's value proposition is <em>&quot;everything Kademlia does, plus learning.&quot;</em> The 3δ-floor result and the Slice World recovery are improvements <em>on top of</em> a working Kademlia substrate — not replacements for it. When you read NH-1 source code, you read Kademlia idioms throughout.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-pastry--scribe">What is Pastry / SCRIBE?</h2>
<p><strong>Rowstron &amp; Druschel</strong> (Microsoft Research + Rice — Middleware 2001, <em>Pastry: Scalable, decentralized object location and routing for large-scale peer-to-peer systems</em>) is the <strong>direct sibling of Tapestry</strong> — same era, same family (prefix-based + locality-aware), substrate for <strong>PAST</strong> (persistent storage) and <strong>SCRIBE</strong> (pub/sub). Together Pastry and Tapestry are the <strong>two foundational lineages</strong> for any locality-aware adaptive DHT.</p>
<br />
<p><strong>The defining contribution: three-tier routing state.</strong> Each Pastry node maintains:</p>
<table>
<thead>
<tr>
<th>Structure</th>
<th>Purpose</th>
<th>Size at b=4</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Routing table R</strong></td>
<td>Prefix-matched routing across <code>⌈log_(2^b) N⌉</code> rows × <code>2^b − 1</code> entries</td>
<td>~75 entries at 1 M nodes</td>
</tr>
<tr>
<td><strong>Leaf set L</strong></td>
<td>Numerically-closest peers; used for the <strong>final routing hop</strong></td>
<td>16–32 entries</td>
</tr>
<tr>
<td><strong>Neighborhood set M</strong></td>
<td>RTT-closest peers; <strong>not routed through</strong> but kept current to maintain locality</td>
<td>16–32 entries</td>
</tr>
</tbody>
</table>
<p><strong>Locality-preserving join.</strong> When a new node X joins, it asks a nearby existing node A to route a &quot;join&quot; message with key=X. Each node along the path sends X its tables; <strong>X takes row n of its routing table from the n-th node along the route</strong>. Triangulation-inequality argument preserves locality without exhaustive search. A second-stage refinement queries each entry's own tables for closer alternatives.</p>
<p><strong>SCRIBE pub/sub</strong> (Castro, Druschel, Kermarrec, Rowstron — JSAC 2002, layered on Pastry): <code>topicId = hash(name)</code> → subscribe routed to the rendezvous point; <strong>every node along the path records subscriber state</strong>; publisher sends to rendezvous; multicast tree formed by the <strong>reverse paths</strong> of all subscribes. <strong>This is structurally identical to NH-1's axonal-tree mechanism</strong> — same recipe, our terminology.</p>
<p><strong>Headline metrics.</strong> ~5 hops at 100 K nodes (= <code>⌈log_16 100K⌉</code>); RDP ~1.3–1.4× the complete-routing-table optimum; locates closest of k=5 replicas 76 % (92 % top-2) of the time; 57 RPCs to repair tables per failed node; ~3000 msg/s per Java node, unoptimized.</p>
<p><span class="callout"><strong>For this project:</strong> Pastry contributed the <strong>three-tier routing state</strong> that NH-1's vitality-scored synaptome consolidates, and <strong>SCRIBE</strong> is the structural ancestor of axonal-tree pub/sub. Pastry is the <em>structural</em> sibling of Tapestry's <em>architectural</em> contribution.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="pastry-vs-n-dht">Pastry vs N-DHT</h2>
<p>The cleanest one-paragraph framing: <strong>NH-1's synaptome is Pastry's R/L/M collapsed into a single tier scored by <code>weight × recency</code>. The roles persist; the bookkeeping is unified.</strong></p>
<br />
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Pastry</th>
<th>NH-1</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Routing state</strong></td>
<td><strong>Three explicit tables</strong> (R, L, M)</td>
<td><strong>One vitality-scored synaptome</strong> that places each peer into its effective tier</td>
</tr>
<tr>
<td><strong>Leaf set role</strong></td>
<td>Numerically-closest 16–32 peers, terminal-hop guarantee</td>
<td>Synaptome's <strong>high-vitality core</strong> — well-trafficked nearby peers, dominate terminal-hop routing</td>
</tr>
<tr>
<td><strong>Routing table role</strong></td>
<td>Prefix-matched coverage, ~75 entries</td>
<td><strong>Mid-vitality</strong> entries distributed across XOR strata</td>
</tr>
<tr>
<td><strong>Neighborhood set role</strong></td>
<td>RTT-close peers kept for locality maintenance</td>
<td><strong>Low-vitality entries + 2-hop annealing pool</strong> — candidate replacements, not primary routes</td>
</tr>
<tr>
<td><strong>Locality</strong></td>
<td>Static after locality-preserving join; lazy repair</td>
<td>Continuously evolved via LTP, triadic closure, hop caching, lateral spread</td>
</tr>
<tr>
<td><strong>Pub/sub</strong></td>
<td>SCRIBE — routed subscribe + reverse-path forwarding tree, layered on top</td>
<td><strong>Axonal trees</strong> — same mechanism, built into the protocol; tree adapts via re-subscribe</td>
</tr>
<tr>
<td><strong>Bootstrap</strong></td>
<td>Locality-preserving join (take row n from n-th hop)</td>
<td>Sponsor-chain join — <strong>directly inherited from Pastry</strong>, generalized to XOR strata</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Where they overlap (deeply).</strong> Three concrete inheritances: <strong>(1)</strong> the three-tier routing state, even if NH-1 collapses it; <strong>(2)</strong> locality-preserving join — Pastry formalized it, we still use it; <strong>(3)</strong> SCRIBE → axonal trees — <em>the same mechanism</em>, named differently.</p>
<p><strong>Where N-DHT continues.</strong> Pastry's locality is <em>static after bootstrap</em>; ours <em>evolves</em> via LTP. SCRIBE trees are <em>fixed by routing topology</em>; our axon trees <em>re-shape</em> via re-subscribe and incoming promotion. Pastry's leaf set is fixed-size and ID-proximal; our high-vitality core is <em>traffic-earned</em>.</p>
<p><span class="callout"><strong>Pastry is the structural ancestor; Tapestry is the architectural ancestor.</strong> Together they give us the two foundational lineages, and NH-1 sits at the synthesis point: Pastry's three-tier structure (consolidated into vitality), Tapestry's locality-aware routing (made dynamic via AP scoring), Pastry's SCRIBE (made adaptive via re-subscribe), Tapestry's soft-state repair (event-triggered + Patchwork). NH-1 = Berkeley + Cambridge + learning.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-tapestry--dolr">What is Tapestry / DOLR?</h2>
<p><strong>Zhao, Huang, Stribling, Rhea, Joseph, Kubiatowicz</strong> (UC Berkeley + MIT — JSAC 2004, <em>Tapestry: A Resilient Global-Scale Overlay for Service Deployment</em>) is <strong>the foundational paper on putting locality, soft-state, and resilience in the routing layer itself</strong>. It was the substrate for OceanStore, Bayeux multicast, Mnemosyne steganographic storage, and Spamwatch — the closest-shaped historical ancestor of the entire NH-1 architecture.</p>
<br />
<p><strong>Two core ideas:</strong></p>
<ul>
<li><strong>Prefix routing with locality optimization.</strong> Like Pastry, Tapestry routes by progressively matching one more digit of the destination ID per hop (base β=16, log₁₆ N hops). The Tapestry-specific contribution: at each routing-table slot, the entry stored is the <strong>closest node by RTT</strong> that matches the prefix at that level. The routing table is built at node insertion via iterative nearest-neighbor search.</li>
<li><strong>DOLR — Decentralized Object Location and Routing.</strong> A different API from &quot;DHT&quot;: <code>PublishObject</code>, <code>RouteToObject</code>, <code>RouteToNode</code>. When a server stores object O at GUID, it routes a <em>publish</em> message toward O's deterministic root; <strong>every node along the publish path stores <code>&lt;GUID, server&gt;</code> as a soft-state location pointer.</strong> Queries route toward the root and intersect the publish path early. The &quot;tree&quot; of replica locations <em>emerges from the union of publish paths</em>, not from explicit construction.</li>
</ul>
<br />
<p><strong>Headline metric — RDP (Relative Delay Penalty)</strong> = <code>Tapestry route latency ÷ direct IP latency</code>. Median ≈ 1 in the wide area; 90th percentile ~2–3. With <code>(k backups, l nearest, m hops)</code> location-pointer optimization, 90th-percentile RDP drops below 4 even at short distances. <strong>~100 % routing success under massive failures (20 % kill, 50 % join) and continuous churn (4-min mean lifetime).</strong></p>
<p><span class="callout"><strong>For this project:</strong> Tapestry is <em>not</em> a parallel mechanism to compare against — it is the <strong>historical precedent</strong> for three of NH-1's four design pillars (locality, soft-state, resilience). Where it stops, our learning continues; where it ends with Bayeux-on-top, our pub/sub is built-in.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="tapestry-vs-n-dht">Tapestry vs N-DHT</h2>
<p>The closest-shaped ancestor — and the clearest &quot;what we inherit, what we add&quot; comparison.</p>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Tapestry / DOLR</th>
<th>N-DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Routing primitive</strong></td>
<td>Prefix matching, base β=16</td>
<td>Kademlia XOR (Kademlia base-2 strata)</td>
</tr>
<tr>
<td><strong>Locality in routing table</strong></td>
<td><strong>Closest node by RTT</strong> stored per prefix slot, built at insertion</td>
<td><strong>Latency-penalized AP score</strong> evaluated dynamically per lookup; S2 prefix in IDs structurally seeds locality</td>
</tr>
<tr>
<td><strong>When locality is set</strong></td>
<td>Once, at node insertion (RTT-optimized routing table)</td>
<td>Continuously — every successful lookup reinforces locality via LTP</td>
</tr>
<tr>
<td><strong>Replica location</strong></td>
<td>Soft-state pointers along publish paths; query intersects</td>
<td>Axonal trees rooted at deterministic topic ID; subscribers attach during routed subscribe</td>
</tr>
<tr>
<td><strong>Surrogate routing</strong> <em>(canonical term — Tapestry's name)</em></td>
<td>Built-in: when deterministic root is dead, route to closest live ID</td>
<td>NX-4 <em>iterative fallback</em> — same mechanism, different name</td>
</tr>
<tr>
<td><strong>Resilience</strong></td>
<td>Soft-state mesh repair: event-triggered + Patchwork background probes</td>
<td>Temperature reheat on dead-peer discovery; vitality eviction; iterative fallback</td>
</tr>
<tr>
<td><strong>Pub/sub</strong></td>
<td>Layered on top — Bayeux multicast</td>
<td>Built-in — axonal delivery trees</td>
</tr>
<tr>
<td><strong>Deployment</strong></td>
<td>Server-class Java on PlanetLab (~100 machines)</td>
<td>Browser-class WebRTC, simulator targeting 50 K nodes</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Where they overlap (deeply).</strong> <em>Soft-state location pointers along the publish path</em> is structurally identical to <em>axonal subscribe-attach along the routed path</em>. <em>Surrogate routing</em> is exactly NX-4 iterative fallback. <em>Mesh repair</em> (event + Patchwork) is the same family as our reheat + anneal. <em>Multiple backup pointers per slot</em> is what our weighted synaptome candidates do at the slot level. The deeper overlaps are not coincidence — they are <em>NH-1 inheriting Tapestry's architectural choices and pushing them further with learning</em>.</p>
<p><strong>Where N-DHT continues.</strong> Tapestry's locality is <em>static after bootstrap</em>; ours is <em>continuously evolved</em> via LTP, triadic closure, hop caching, lateral spread. Tapestry's pub/sub was layered (Bayeux); ours is built-in. Tapestry's deployment was server-class; ours targets browser-WebRTC.</p>
<p><span class="callout"><strong>The lineage is direct.</strong> Tapestry put locality and resilience in the routing layer; NH-1 makes those properties <em>learn from traffic</em>. Citing Tapestry prominently doesn't dilute our claim — it positions our work in continuity with two decades of validated foundational research. The Berkeley OceanStore family is the closest-shaped ancestor; we are an evolutionary step on that line, not a clean-room reinvention.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-adaptive-stabilization">What is adaptive stabilization?</h2>
<p><strong>Ghinita &amp; Teo</strong> (National University of Singapore — IPDPS 2006, <em>An Adaptive Stabilization Framework for Distributed Hash Tables</em>) addresses one of the longest-running problems in DHT design: <strong>how often should a peer check that its routing table is still correct?</strong></p>
<p>Most DHTs (Chord, Pastry, CAN) run <strong>periodic stabilization</strong> — a fixed-interval timer that pings neighbors and refreshes pointers. Their core claim: <em>a fixed rate is wrong almost everywhere</em>. Too low → lookup failure spikes during churn bursts (their data: 23.7 % failure at 5 / sec churn). Too high → 400 %+ communication overhead even during quiet periods.</p>
<br />
<p><strong>Mechanism: each peer estimates local conditions, models pointer staleness probabilistically, and triggers checks only when warranted.</strong> Per peer:</p>
<ul>
<li>Estimate <strong>node failure rate μ</strong> and <strong>node join rate λ</strong> locally (rolling window of observations)</li>
<li>Estimate <strong>network size N</strong> from successor-list density</li>
<li>Compute <strong><code>P_dead(p) = 1 − exp(−μ × Δt)</code></strong> (probability pointer p's target died) and <strong><code>P_inacc(p)</code></strong> (probability a new joiner now sits between p and its ideal target)</li>
<li><strong>Split stabilization into two channels with very different costs:</strong>
<ul>
<li><strong>Liveness check</strong> — O(1) ping, fires when <code>P_dead × P_fwd &gt; threshold</code></li>
<li><strong>Accuracy check</strong> — O(log N) lookup, fires when <code>P_inacc &gt; threshold</code></li>
</ul>
</li>
<li>Operate against a single tunable knob: <strong>target lookup failure rate <code>Pf</code></strong></li>
</ul>
<p><strong>Headline result.</strong> On Chord with variable churn (peak-hour pattern), Adaptive Stabilization (AS) hits <strong>2.2 % peak failure at 172 % overhead</strong> — vs Periodic Stabilization's <strong>7.5 % failure at 420 % overhead</strong>. <strong>3.4× lower failure, 2.4× lower overhead</strong> simultaneously, by self-tuning rather than hand-picking a rate.</p>
<p><span class="callout"><strong>For this project:</strong> this is the closest match in <em>mechanism family</em> of any DHT comparison we make. The instinct — &quot;the protocol should adapt itself based on local observation, not run on a fixed schedule&quot; — is exactly the Neuromorphic instinct. The difference is what they tune (maintenance rate) vs what we tune (synaptome composition).</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="adaptive-stabilization-vs-n-dht">Adaptive stabilization vs N-DHT</h2>
<p>Both reject fixed-schedule maintenance. Different observables, different actions.</p>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Ghinita &amp; Teo (Adaptive Stabilization)</th>
<th>N-DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>What's adapted</strong></td>
<td>Stabilization rate per routing pointer</td>
<td>Synaptome composition (which peers are kept)</td>
</tr>
<tr>
<td><strong>Trigger</strong></td>
<td><code>P_dead</code> or <code>P_inacc</code> exceeds threshold</td>
<td>Dead-peer discovery (reheat); per-lookup probabilistic anneal</td>
</tr>
<tr>
<td><strong>Local observable</strong></td>
<td>Node failure rate <strong>μ</strong>, join rate <strong>λ</strong> estimated from routing table</td>
<td>Per-synapse <code>weight × recency</code>; observed dead peers</td>
</tr>
<tr>
<td><strong>Statistical model</strong></td>
<td>Closed-form: <code>P_dead = 1 − exp(−μΔt)</code>, <code>P_inacc</code> from new-joiner density</td>
<td>None — vitality is a heuristic correlate, not a probabilistic model</td>
</tr>
<tr>
<td><strong>QoS knob</strong></td>
<td><strong>Yes — single dial <code>Pf</code> (target lookup failure rate)</strong></td>
<td><strong>No — parameters are tuned by sweep, not by a target</strong></td>
</tr>
<tr>
<td><strong>Liveness vs accuracy</strong></td>
<td><strong>Explicit decoupled channels</strong> with different cost / threshold</td>
<td><strong>Implicit, mixed</strong> — both fire as side-effects of routing</td>
</tr>
<tr>
<td><strong>What survives</strong></td>
<td>Routing pointers (back to canonical-XOR ideal)</td>
<td>Routing pointers (toward traffic-shaped optimum)</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Where they overlap.</strong> Decentralized self-monitoring + threshold-triggered protocol response — the same control-loop architecture as our <strong>temperature reheat</strong> (NX-6), Makris's <strong>DFE migration</strong>, and the proposed <strong>load-aware AP scoring</strong>. <em>Four independent works converging on the same architectural pattern</em> is meaningful evidence that this is a recognizable design class, not a one-off choice.</p>
<p><strong>Where they differ.</strong> Ghinita-Teo is purely <em>statistical</em> — derive analytical formulas, estimate parameters, threshold. NH-1 is <em>biological</em> — synaptic weights, vitality, decay. Both work; both have limits. <strong>The synthesis would be NH-1 with Ghinita-style statistical estimation of churn driving adaptive anneal/reheat parameters.</strong></p>
<p><span class="callout"><strong>The headline trade.</strong> Their stabilization brings a Chord routing table back to its canonical ideal under churn. Our learning evolves the routing table <em>away</em> from the canonical ideal toward a traffic-shaped one. <strong>Combining the two — Ghinita's adaptive <em>cadence</em> with NH-1's adaptive <em>content</em> — is the metaplastic NH-1 we keep gesturing at.</strong></span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-coral-dsht">What is Coral DSHT?</h2>
<p><strong>Coral</strong> (Freedman, Freudenthal, Mazières — NSDI 2004) is a <strong>distributed sloppy hash table</strong> that powered Coral CDN — one of the earliest production decentralized content-distribution networks. Coral coined the term <em>DSHT</em> to distinguish itself from strict DHTs.</p>
<p><strong>Mechanism — hierarchical RTT clusters.</strong> Each node measures round-trip time to every other node it encounters and joins <strong>multiple nested clusters</strong> at increasing RTT thresholds (e.g. &lt; 20 ms, &lt; 60 ms, global). Each cluster runs its own internal DHT.</p>
<p><strong>Lookup is local-first.</strong> When a node queries a key, it first searches the tightest cluster it belongs to. If no result is found there, it expands outward to the next cluster, and so on. Most queries terminate in the local cluster — cross-cluster fan-out happens only when necessary.</p>
<p><strong>&quot;Sloppy&quot; semantics.</strong> The strict DHT promise — <em>one canonical XOR-closest node per key</em> — is deliberately relaxed. A key may be stored at <em>any</em> node in the lookup cluster, and queries return the <em>first</em> hit, not the canonical one. This is what makes Coral a CDN: the same content is replicated at many local nodes, and clients pull from the nearest available.</p>
<p><strong>Production deployments:</strong> Coral CDN (2004 – ~2015) — handled millions of cache requests per day at peak, served as a free CDN for academic and small-publisher sites.</p>
<p><span class="callout"><strong>For this project:</strong> Coral's hierarchical-cluster idea is <em>parallel</em> to NH-1's weighted-synaptome approach. Both achieve latency-aware routing; they make very different structural commitments to get there.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="coral-vs-n-dht">Coral vs N-DHT</h2>
<p>Both adapt to network latency. They make opposite structural choices.</p>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Coral DSHT</th>
<th>N-DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Structure</strong></td>
<td>Multiple nested DHTs, one per RTT cluster</td>
<td>A single flat synaptome with weighted edges</td>
</tr>
<tr>
<td><strong>Locality discovery</strong></td>
<td>Active RTT measurement at join + cluster membership</td>
<td>Passive — observed traffic reinforces useful edges; S2 prefix seeds initial regional bias</td>
</tr>
<tr>
<td><strong>Storage semantics</strong></td>
<td><em>Sloppy</em> — multiple replicas per key, return-first-found</td>
<td><em>Strict</em> — one canonical XOR-closest node per key</td>
</tr>
<tr>
<td><strong>Lookup</strong></td>
<td>Local cluster first, escalate outward only if needed</td>
<td>Single greedy AP walk over weighted synaptome</td>
</tr>
<tr>
<td><strong>Adaptation</strong></td>
<td>Cluster boundaries are static thresholds; nodes move between clusters</td>
<td>Continuous: weights update on every successful path</td>
</tr>
<tr>
<td><strong>Designed for</strong></td>
<td>Read-heavy content distribution (CDN) — many readers, mostly-static content</td>
<td>Routing + pub/sub — dynamic membership, real-time delivery</td>
</tr>
<tr>
<td><strong>Pub/sub support</strong></td>
<td>Out of scope</td>
<td>First-class via axonal trees</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Where they overlap:</strong> both reject the &quot;one fixed routing structure for all distances&quot; approach. Both treat geographic locality as a property to <em>exploit</em>, not just record.</p>
<p><strong>Where they differ:</strong> Coral <em>enforces</em> locality through the hierarchical cluster structure — every node <em>knows</em> what's near. N-DHT <em>learns</em> locality through usage — every node <em>discovers</em> what's near via routed traffic. Coral relaxes the DHT promise to be local-first; N-DHT preserves the strict DHT promise and learns shortcuts on top.</p>
<p><span class="callout">Coral's design choice was: &quot;give up the canonical mapping to win locality.&quot; NH-1's design choice was: &quot;keep the canonical mapping; make locality emerge from learning.&quot; Different engineering trade-offs against the same core problem.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-vivaldi">What is Vivaldi?</h2>
<p><strong>Vivaldi</strong> (Dabek, Cox, Kaashoek, Morris — SIGCOMM 2004) is a <strong>decentralized network coordinate system</strong>. Each node continuously adjusts a synthetic position vector — typically in 3-dimensional Euclidean space plus a small &quot;height&quot; component — so that the <em>Euclidean distance</em> between any two nodes' coordinates approximates the <em>measured round-trip time</em> between them.</p>
<p><strong>Mechanism.</strong> Each node starts at a random position. Whenever it exchanges traffic with a peer, it observes the actual RTT, then applies a small spring-force adjustment to its own coordinate — pulling toward or pushing away from that peer to better match observation. Confidence in each measurement weights the magnitude of the move. Over many such observations, the system converges to a stable configuration where pair-wise Euclidean distances ≈ pair-wise RTTs.</p>
<p><strong>What it accomplishes.</strong> Any node can <em>predict</em> RTT to any peer it has never directly measured, purely from coordinates. Routing layers (or applications) can then choose &quot;nearby&quot; peers without an active probe round — Vivaldi turns latency into a queryable global property of the network. The system is fully decentralized: no coordinator, no infrastructure, no synchronization.</p>
<p><strong>Production deployments:</strong> Coral CDN, Azureus / Vuze (BitTorrent), some content-addressable overlays. The most influential predecessor for <em>latency-aware</em> peer-to-peer design.</p>
<p><span class="callout"><strong>For this project:</strong> a Vivaldi-style coordinate system is a candidate for replacing NH-1's <em>structural</em> S2 prefix with a <em>learned</em> locality primitive. Future benchmarks may include a Vivaldi-style protocol for completeness — both as a comparison reference and as a forward-looking direction.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="vivaldi-vs-n-dht">Vivaldi vs N-DHT</h2>
<p>Both are adaptive routing systems. They optimize different things.</p>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Vivaldi</th>
<th>N-DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Mechanism</strong></td>
<td>Synthetic coordinates in N-D Euclidean space</td>
<td>Hebbian reinforcement on routing edges</td>
</tr>
<tr>
<td><strong>What's learned</strong></td>
<td>A position vector per node that predicts RTT to any peer</td>
<td>A weight per synapse, reinforced by traffic on successful paths</td>
</tr>
<tr>
<td><strong>Output</strong></td>
<td>RTT prediction (any pair)</td>
<td>A ranked list of next-hops (per lookup)</td>
</tr>
<tr>
<td><strong>Locality discovery</strong></td>
<td>Emergent from RTT measurements</td>
<td>Imposed via S2 cell ID prefix</td>
</tr>
<tr>
<td><strong>Convergence guarantee</strong></td>
<td>Yes — coordinate descent on RTT residuals</td>
<td>Empirical — depends on traffic mixing</td>
</tr>
<tr>
<td><strong>Layered separation</strong></td>
<td>Coordinate system is generic; any routing layer can use it</td>
<td>Routing and learning are integrated in a single protocol</td>
</tr>
<tr>
<td><strong>Pub/sub support</strong></td>
<td>Out of scope — Vivaldi is a primitive</td>
<td>First-class — axonal tree built on routed synaptome</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Where they overlap:</strong> both treat the network as something to <em>measure and adapt to</em>, not a fixed topology to traverse.</p>
<p><strong>Where they differ:</strong> Vivaldi predicts RTT, then any routing layer uses those predictions. N-DHT learns <em>paths</em> via reinforcement on the routing layer itself — locality is built into the IDs, learning sharpens the path within that locality.</p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-route-diversity-replication">What is route-diversity replication?</h2>
<p><strong>Castro, Druschel, Ganesh, Rowstron, Wallach</strong> (Microsoft Research / Rice — OSDI 2002, <em>Secure Routing for Structured Peer-to-Peer Overlay Networks</em>) is the foundational paper on <strong>Byzantine fault tolerance</strong> in DHTs. They prove that three jointly-necessary mechanisms make a DHT robust against malicious nodes: <strong>constrained routing tables</strong>, <strong>secure node ID assignment</strong>, and <strong>redundant routing</strong>. The third is what later work elaborates.</p>
<p><strong>Harvesf &amp; Blough</strong> (Georgia Tech — IEEE P2P 2007, <em>The Design and Evaluation of Techniques for Route Diversity in Distributed Hash Tables</em>) makes the redundant-routing piece concrete with a clean theorem:</p>
<br />
<p><strong>To produce d disjoint routes from any source to a key k in a prefix-matching DHT with base B,</strong><br />
<strong>replicate k at (n+1) × B^m locations,</strong> with <code>m = ⌊(d−1)/(B−1)⌋</code> and <code>n = (d−1) mod (B−1)</code>.</p>
<br />
<p>The replicas are placed by <strong>varying the length of common prefix</strong> among replica IDs — so that any two routes from a query node to the replica set diverge at the first hop and never share an intermediate. Two complementary techniques:</p>
<ul>
<li><strong>MaxDisjoint replica placement</strong> — the placement formula above. Multiple disjoint paths to the <em>content</em>.</li>
<li><strong>Neighbor Set Routing (NBR)</strong> — issue the lookup through the source's <em>neighbors'</em> tables, not just your own. Multiple disjoint paths from the <em>source</em>.</li>
</ul>
<p><strong>Empirical headline (1024-node Pastry, 8 replicas, 100 K lookups):</strong> with <strong>half the network compromised</strong>, MaxDisjoint + NBR routes <strong>90 % of lookups successfully</strong> — vs ~66 % for replica placement alone, and ~50 % for random placement.</p>
<p><span class="callout"><strong>For this project:</strong> route-diversity replication is the canonical answer to the Byzantine-resistance gap our red-team analysis flags. The mechanism is well-studied; what we'd add is <em>specializing it for axonal pub/sub topic roots and S2-cell eclipse defense</em>.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="route-diversity-dhts-vs-n-dht">Route-diversity DHTs vs N-DHT</h2>
<p>Both families care about routing robustness. They commit to different mechanisms.</p>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Castro / Harvesf-Blough</th>
<th>N-DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Threat model</strong></td>
<td>Byzantine — malicious nodes that lie about routing</td>
<td>Crash-failure — honest peers that disappear</td>
</tr>
<tr>
<td><strong>Mechanism</strong></td>
<td>Replicate the <em>target</em> at d disjoint placements; query in parallel</td>
<td>Maintain a weighted <em>synaptome</em> with overlapping candidates per logical destination</td>
</tr>
<tr>
<td><strong>What's redundant</strong></td>
<td>Multiple disjoint <em>paths to the same key</em></td>
<td>Multiple weighted <em>next-hop options</em> per lookup</td>
</tr>
<tr>
<td><strong>Activation</strong></td>
<td>Always — every lookup queries replicas in parallel (or in batches)</td>
<td>Reactive — iterative fallback only fires when greedy AP routing dead-ends</td>
</tr>
<tr>
<td><strong>Cost</strong></td>
<td>×d storage, parallel network load per lookup</td>
<td>One synaptome; lookup load unchanged</td>
</tr>
<tr>
<td><strong>Pub/sub support</strong></td>
<td>Out of scope</td>
<td>First-class via axonal trees — but currently single-replica root</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Where they overlap.</strong> Both reject &quot;one route is enough.&quot; Both treat the routing fabric as something whose redundancy can be <em>engineered for</em> rather than hoped for.</p>
<p><strong>Where they differ.</strong> Castro / Harvesf-Blough is <strong>storage-side redundancy</strong> (the same key lives in d places, queries are parallel). N-DHT is <strong>synaptome-side redundancy</strong> (one key lives in one place, the routing table holds many candidates per direction). The two are complementary, not competing — a real production system would likely use both.</p>
<p><span class="callout"><strong>The headline trade.</strong> Their work delivers strong Byzantine resilience (90 % success at 50 % malicious) at the cost of d× storage and parallel query load. N-DHT delivers strong crash-failure resilience (100 % delivery under 5 % churn) at the cost of zero extra storage. Combining the two — MaxDisjoint replication of NH-1 axon-tree roots — is the obvious next step for a Byzantine-tolerant pub/sub.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-hotspot-aware-placement">What is hotspot-aware placement?</h2>
<p><strong>Makris, Tserpes, Anagnostopoulos</strong> (Harokopio Athens — IEEE BIGDATA 2017, <em>A novel object placement protocol for minimizing the average response time of get operations in distributed key-value stores</em>) addresses a problem that consistent-hashing DHTs systematically ignore: <strong>request rates are not uniform even when keys are.</strong></p>
<p>Real workloads follow <strong>Zipf's law</strong> — a small set of &quot;hot&quot; keys takes most of the traffic. Their measurement on a 24-node Redis cluster: even with keys evenly distributed, the hottest node received <strong>222 K requests</strong> while others received ~1–10 K each. Response time on the hotspot was 5× the cluster median. <strong>Consistent hashing solves the wrong half of the problem.</strong></p>
<br />
<p><strong>Mechanism: Directory For Exceptions (DFE).</strong> A hybrid placement that keeps consistent hashing as the <em>default</em> and adds a small distributed override:</p>
<ol>
<li>Each node monitors its own <strong>average response time (RT)</strong> and <strong>request count (NR)</strong></li>
<li>When <code>max(NR) &gt; permissible threshold T</code>, the node identifies its hottest keys</li>
<li>Picks the <strong>least-loaded peer</strong> in the cluster (offline FFD bin-packing chooses placements)</li>
<li><strong>Migrates</strong> the hot key there</li>
<li>Installs a <strong>DFE entry</strong> — other nodes consult DFE before falling back to the hash function</li>
</ol>
<p>Fully decentralized: each node operates independently, no central coordinator.</p>
<p><strong>Headline result.</strong> Hotspot N3's response time <strong>dropped 86 %</strong>; load uniformized across the cluster (~10 K – 25 K requests per node, down from 222 K on N3). The other nodes saw response time rise ~3.9× — but stayed well below the threshold.</p>
<p><span class="callout"><strong>For this project:</strong> the <em>hot-key migration</em> pattern maps directly onto NH-1's pub/sub <em>gateway concentration</em> failure mode. A topic with millions of subscribers is the same engineering problem as Redis's hot key — and the DFE mechanism is the family of answers that fits.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="hotspot-aware-vs-n-dht">Hotspot-aware vs N-DHT</h2>
<p>Both care about routing performance under <em>non-uniform</em> conditions. Different non-uniformities.</p>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Makris et al. (DFE)</th>
<th>N-DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Skew dimension</strong></td>
<td>Request rate per key (Zipf-distributed gets)</td>
<td>Crash failure / churn (nodes disappearing)</td>
</tr>
<tr>
<td><strong>Trigger</strong></td>
<td>Local threshold on RT or NR exceeded</td>
<td>Lookup failure / dead-peer discovery</td>
</tr>
<tr>
<td><strong>Response</strong></td>
<td>Migrate hot keys to underloaded peers</td>
<td>Anneal lowest-vitality synapse, reheat temperature</td>
</tr>
<tr>
<td><strong>State change</strong></td>
<td>Physical key migration + DFE redirect entries</td>
<td>Synaptome reweighting + new edges via LTP / triadic</td>
</tr>
<tr>
<td><strong>Mechanism family</strong></td>
<td>Cooperative location cache (DFE)</td>
<td>Cooperative location cache (hop caching)</td>
</tr>
<tr>
<td><strong>Setting assumptions</strong></td>
<td>24-node Redis cluster, full-mesh TCP, stable nodes, honest reporting</td>
<td>50K-node P2P overlay, partial mesh, churn, possibly adversarial</td>
</tr>
<tr>
<td><strong>Pub/sub support</strong></td>
<td>Out of scope (KV gets only)</td>
<td>First-class via axonal trees</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Where they overlap.</strong> Both treat <em>self-monitoring + threshold-triggered protocol response</em> as the right control-loop architecture. Both use a &quot;directory of exceptions&quot; / &quot;hop cache&quot; — a cooperative override of the canonical placement function — as the data structure that implements the override. Both reduce a balance problem to a packing problem (FFD for them, axon-tree branching for us).</p>
<p><strong>Where they differ.</strong> They assume <strong>stable cooperative nodes with global load knowledge</strong>; we cannot. Their FFD requires snapshot information our overlay can't cheaply collect. The <em>adaptation</em> needs translation: their migration becomes our <em>axon-tree root migration</em>, their FFD becomes our <em>load-aware AP scoring</em>.</p>
<p><span class="callout"><strong>The headline trade.</strong> Their work targets <em>content-popularity skew</em> in stable clusters. N-DHT targets <em>node-failure / churn skew</em> in dynamic overlays. Bringing the two together — <strong>load-aware AP scoring + threshold-triggered axon-root migration</strong> — closes the <em>gateway concentration</em> failure mode the deck currently leaves open.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="example-message-protocol">Example Message Protocol</h2>
<p><span class="muted"><em>Reference slide — the wire-level protocol surface. Skim if you only care about results; consult when you want to know what NH-1 actually exchanges between peers.</em></span></p>
<p><strong>Two layers.</strong> The application sees exactly two messages — SEND and RECEIVE. Everything else is the lower-level p2p wire protocol that implements them.</p>
<br />
<p><strong>Application layer</strong> — what an application built on NH-1 actually calls:</p>
<table>
<thead>
<tr>
<th>Message</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>SEND</strong> (target, payload)</td>
<td>Deliver a message toward a target — node, key, or topic</td>
</tr>
<tr>
<td><strong>RECEIVE</strong> (handler)</td>
<td>Register to receive messages addressed here, or to a topic this node subscribes to</td>
</tr>
</tbody>
</table>
<br />
<p><strong>P2P wire layer</strong> — the messages NH-1 exchanges between peers to make SEND / RECEIVE work. Application code never constructs these directly.</p>
<table>
<thead>
<tr>
<th>Message</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td>PING / PONG</td>
<td>Liveness</td>
</tr>
<tr>
<td>FIND_NODE</td>
<td>DHT lookup step</td>
</tr>
<tr>
<td>ROUTE</td>
<td>Routed message toward a key (subscribe, publish, generic SEND)</td>
</tr>
<tr>
<td>SUBSCRIBE / UNSUBSCRIBE</td>
<td>Pub/sub membership; carries <code>lastSeenTs</code> for replay</td>
</tr>
<tr>
<td>PUBLISH</td>
<td>Publish to topic</td>
</tr>
<tr>
<td>DIRECT_DELIVER, ADOPT_SUBSCRIBERS, REPLAY_BATCH</td>
<td>Axonal pub/sub specifics</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Common envelope</strong> (every wire message): version, type, sender, signature, timestamp, nonce, payload. Routing is <strong>stateless in the protocol</strong>. All state lives per-node: synaptome + axon roles.</p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="deployment-considerations">Deployment considerations</h2>
<ul>
<li><strong>Trust model.</strong> No central authority. Public-key signatures authenticate peers.</li>
<li><strong>Sybil resistance.</strong> S2 cell prefix lightly discourages sybil swarms per-cell — not a full defense. Proof-of-location or a proof-of-work (<strong>PoW</strong>) join hurdle recommended for open deployments.</li>
<li><strong>Provisioning.</strong> Bootstrap via a small published sponsor set; fully decentralized thereafter.</li>
<li><strong>Observability.</strong> Nodes export local stats (synaptome health, LTP rate, role counts) for operator overlays.</li>
</ul>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="pubsub-failure-modes-we-can-name">Pub/sub failure modes we can name</h2>
<p>Honest accounting of where the axonal tree shows seams:</p>
<ul>
<li><strong>Forwarder loss under churn.</strong> When a tree-internal node dies mid-publish, its subtree is briefly unreachable until each member's next refresh. Today: each affected node's periodic re-subscribe routes to whichever live axon is now closest to <code>topicId</code> and re-attaches there — no explicit subtree move, the tree heals at the speed of the refresh interval. <em>Possible:</em> redundant forwarders or proactive health checks to shorten the gap.</li>
<li><strong>Tree rebuild cost at scale.</strong> O(S × F) for S subscribers and F forwarders. Negligible at 2 K subscribers; measurable at 50 K+. <em>Possible:</em> incremental updates rather than full rebuilds.</li>
<li><strong>Gateway concentration.</strong> A skewed synaptome can yield deep-narrow trees instead of broad-shallow ones, <em>and</em> a Zipf-popular topic concentrates load on its single root. Today: recursive delegation distributes load. <em>Possible:</em> secondary splitting on geographic cell when one gateway covers &gt; 50 % of remaining children, plus <strong>threshold-triggered hot-axon-root migration</strong> with a DFE-style redirect entry (Makris et al. 2017) — the same mechanism Redis clusters use for hot-key skew.</li>
<li><strong>Synaptome–tree coupling.</strong> Annealing replacing a synapse that's also a forwarder leaves a stale tree until TTL. <em>Possible:</em> mark tree dirty on synapse eviction.</li>
<li><strong>Byzantine resistance.</strong> The system assumes honest nodes. <em>Possible:</em> MaxDisjoint replica placement (Harvesf &amp; Blough 2007) for axon-tree roots, plus the Castro et al. (OSDI 2002) triplet — constrained routing tables, secure node-ID assignment, redundant routing — proof-of-location, cryptographic ID binding, reputation, multi-path verification.</li>
</ul>
<br />
<p><span class="muted">Every item above is documented in Chapter 7 of the whitepaper with current mitigation and a candidate fix. None are blockers for the headline workloads in this deck — but each is a named, measurable failure mode the architecture should answer for in the next iteration.</span></p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="limitations-and-future-directions">Limitations and future directions</h2>
<p><strong>Known limitations</strong></p>
<ul>
<li><strong>Warmup dependency.</strong> N-DHT needs ~5 000 lookups before the synaptome converges. The first minute of deployment is suboptimal.</li>
<li><strong>Synaptome capacity bounded at 50.</strong> A deliberate cross-browser target. Server deployments could use 200–500.</li>
<li><strong>Locality requires geographic IDs.</strong> Without S2 prefix, regional locality collapses. <em>(Vivaldi-style RTT-only locality is future work.)</em></li>
<li><strong>Training is compute-optimizing, not path-shortening.</strong> Cannot close the bootstrap → omniscient hop gap without changes to bootstrap or annealing.</li>
<li><strong>Memory &amp; bandwidth overhead.</strong> ~50 synapses × ~80 B metadata ≈ 4 KB / node + axonal-tree state per subscribed topic. Modest, but worth measuring at 50 K+ subscribers.</li>
<li><strong>Workload skew not yet stressed.</strong> Today's pub/sub benchmark uses uniform topic activity. Real workloads are Zipf-distributed (few hot topics, long tail). Single-root axon trees may saturate under content popularity — methodology gap addressed in red-team Phase 2 (Zipf publish workload).</li>
<li><strong>Churn rate is uniform in current benchmarks.</strong> Real networks churn unevenly — corporate workdays, time-of-day peaks, regional outages. Variable-churn (&quot;peak-hour&quot;) benchmarking is the sharper test of self-tuning; it is a methodology gap addressed in red-team Phase 2 (variable-churn benchmark, Ghinita-Teo style).</li>
</ul>
<p><strong>Future directions</strong></p>
<ul>
<li><strong>RTT-driven locality (Vivaldi integration).</strong> Today's locality is structural; an embedded coordinate system could drive locality without a geo-prefix.</li>
<li><strong>Adaptive synaptome capacity.</strong> Bump capacity during join-heavy periods; prune in steady state.</li>
<li><strong>Global-pool annealing.</strong> Periodically replace the lowest-vitality synapse with a <em>globally-sampled</em> candidate rather than a 2-hop sample — closes the bootstrap → omniscient gap.</li>
<li><strong>Larger-scale evaluation.</strong> 100 K / 250 K / 1 M nodes. Preliminary 50 K data exists; larger runs need server-side simulation.</li>
<li><strong>Proof-of-location.</strong> The S2 prefix is self-declared today. A verifiable location primitive would prevent prefix forgery.</li>
</ul>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="key-takeaways">Key takeaways</h2>
<ol>
<li>
<p><strong>NH-1 collapses ~18 NX-17 rules into 12 rules organised under 5 operations.</strong> A single vitality function — <code>weight × recency</code> — drives every admission decision.</p>
</li>
<li>
<p><strong>15 % server-class nodes (highway%) captures 70 % of the available latency improvement.</strong> Realistic deployment doesn't need a uniform server fleet.</p>
</li>
<li>
<p><strong>Pub/sub on routed axonal trees: 100 % baseline, 100 % recovered delivery under 5 % churn.</strong> No K-closest replication, no gossip, no parent tracking — just routed re-subscribe.</p>
</li>
<li>
<p><strong>The simulator catches its own bugs.</strong> Skepticism — &quot;if it looks too good to be true, it is&quot; — has saved this deck from at least three retracted findings during this session.</p>
</li>
<li>
<p><strong>Locality in NH-1 is structural (S2 prefix), but the latency map is already in the routing decision.</strong> AP scoring already factors observed RTT into next-hop choice; that latency map is a natural seed for a <strong>Vivaldi-style coordinate system</strong> that could replace the S2 prefix with a <em>learned</em> locality primitive — a forward direction we plan to explore in later iterations.</p>
</li>
</ol>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<h2 id="red-team-review">Red team review</h2>
<p>Three independent red-team passes, all deliberately adversarial — <em>what would break if we shipped this tomorrow?</em></p>
<ul>
<li><strong><code>docs/red-team-analysis.md</code></strong> (2026-04-21, NX-15 / NX-17 era) — transport friction, congestion, ID-space security. Most findings remain valid.</li>
<li><strong><code>docs/red-team-analysis-nh1.md</code></strong> (2026-04-29, NH-1 update) — tracks which gaps consolidation closed and which environmental &quot;cheats&quot; remain.</li>
<li><strong><code>documents/NH1-RedTeam-v0.3.38.md</code></strong> (2026-04-30, <strong>13-issue priority list</strong>) — composite ranking by occurrence × severity × detectability × time-to-fix × deploy-blocker status. Tiers the work into 4 deploy blockers, 4 correctness-under-stress items, and 5 operational-hardening items.</li>
</ul>
<br />
<p>The combined verdict, in one paragraph:</p>
<blockquote>
<p>The simplification of NH-1 means the team is now perfectly positioned to tackle the environmental realities that were previously masked by NX-17's complexity. The &quot;brain&quot; of the DHT is production-ready. The body — connection setup, RPC timeouts, bandwidth saturation, jitter, asymmetric reachability, an adversarial ID space — is the next, <em>measurable, scopeable</em> problem.</p>
</blockquote>
<br />
<p><strong>Three sections follow:</strong></p>
<ul>
<li><strong>Light</strong> — what the architecture got right (all three reviews)</li>
<li><strong>Dark</strong> — environmental and structural gaps the simulator hides</li>
<li><strong>Action plan</strong> — three priority tiers (Deploy blockers · Correctness under stress · Operational hardening)</li>
</ul>
<p><span class="callout"><strong>Total estimated work:</strong> ~6–8 weeks for two engineers to clear deploy blockers (Tier 1); 1–2 quarters for full coverage. Tier 2 and Tier 3 can be staged during early production.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="red-team--what-the-architecture-got-right-the-light">Red team — what the architecture got right (the Light)</h2>
<p><strong>1. LTP-driven routing affinity.</strong> Reinforcing edges based on <em>actual usage and measured latency</em> organically aligns the overlay with the physical network. Nodes build &quot;highways&quot; to reliable, fast peers rather than arbitrary XOR-close ones that may be on poor links. Both reviews flag this as the central architectural win — and it is what the 3δ floor result quantifies.</p>
<br />
<p><strong>2. Unified admission gate (NX-17 → NH-1).</strong> NX-17 had stratified eviction floors, two-tier highway management, and adaptive decay all interacting. NH-1 replaces them with <code>_addByVitality</code> scored by <code>weight × recency</code>. ~10 % latency gap under heavy caps in exchange for a robust, predictable rule that prevents parameter over-fitting.</p>
<br />
<p><strong>3. Publisher-prefix topic IDs.</strong> <code>topicId = publisher.cellPrefix(8b) ‖ hash₅₆(name)</code> deterministically pins each pub/sub root inside the publisher's S2 cell. Local traffic stays local; the publisher's synaptome is already LTP-trained for that exact region. Solves the &quot;random-root geometry&quot; problem that K-closest replication had.</p>
<br />
<p><strong>4. Honest isolation of learning (geoBits = 0 ablation).</strong> Stripping the S2 prefix and re-running shows learning <em>alone</em> yields <strong>+26 % (NX-17) / +8 % (NH-1) over Kademlia</strong> — locality and adaptation separated by measurement, not assertion.</p>
<br />
<p><strong>5. Documented failure modes.</strong> Forwarder loss under churn, tree rebuild cost, gateway concentration, synaptome-tree coupling, byzantine assumptions — every one named with current mitigation and candidate fix. The tree heals at the speed of the 10-second refresh, not magically via gossip.</p>
<footer>v0.3.46 · sim v0.69.00 · 2026-05-02</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="red-team--remaining-gaps-the-dark">Red team — remaining gaps (the Dark)</h2>
<p>The <strong>protocol</strong> has improved. The <strong>environment</strong> it lives in has not. NH-1 over the real internet today would likely face cascading timeouts and congestion collapse before the routing logic ever gets to demonstrate itself.</p>
<br />
<p><strong>1. Frictionless connection fantasy.</strong> Nodes use a peer for routing the moment they discover it. Real WebRTC requires ICE + STUN/TURN + DTLS — <strong>1–3 s of blocking setup, two overlay round trips</strong>. Slice World &quot;unzips&quot; elegantly because hundreds of new triadic closures cost nothing; in production, that would trigger hundreds of simultaneous handshakes and drop the bridge offline.</p>
<p><strong>2. Asynchronous black holes &amp; missing timeouts.</strong> RPCs to dead nodes return instantly because the simulator knows who is alive. <strong>No timeouts, no dropped packets, no asymmetric path failures</strong> (request goes through, reply doesn't). The 100 % pub/sub recovery under 5 % churn assumes instant detection. In the wild, every churn round costs multi-second timeout windows during which messages are lost.</p>
<p><strong>3. Gateway concentration &amp; infinite bandwidth.</strong> Hop cost is <code>10 ms + propagation</code> regardless of load. A highway node carrying 10 K pub/sub messages has the same modeled cost as an idle one. <strong>Buffer saturation is invisible.</strong> AP scoring keeps hammering the &quot;best&quot; nodes — risk of <em>success disaster</em>: LTP reinforces a node until it congests, abandons it, then flocks back when it recovers (oscillatory loops).</p>
<p><strong>4. Jitter-free latency.</strong> Real RTTs fluctuate ±30 % from bufferbloat, asymmetric paths, and queueing. The simulator's distance-derived latency is monotone and clean. The EMA latency tracker has an easy job; high-frequency noise could prematurely decay good synapses or promote lucky-but-unstable ones.</p>
<p><strong>5. Asymmetric reachability and bilateral assumption failure.</strong> The simulator assumes if A connects to B, B can reach A on the same edge. <strong>Carrier-grade NAT, asymmetric firewalls, and asymmetric upstream/downstream bandwidth break that.</strong> Every learning rule (LTP, hop caching, lateral spread, triadic closure) silently encodes the bilateral assumption — a one-directional bridge in Slice World heals only half the network; routing loops become possible when peers' views of each other diverge.</p>
<p><strong>6. Sybil forgery &amp; cell eclipse.</strong> The S2 prefix is self-declared. <strong>An attacker can pick any prefix</strong> and generate IDs that land in a target cell. The canonical mitigation is the <strong>Castro et al. (OSDI 2002) triplet</strong> — constrained routing tables + secure node-ID assignment + redundant routing — combined with route-diversity replica placement (Harvesf &amp; Blough 2007). Proof-of-location, Vivaldi RTT clustering, and IP-ASN bounding are complementary and currently unimplemented.</p>
